<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Document</title>
</head>
<body>
  <img src="logo.png" width="200px" alt="Logo" class="logo">
  <h1 class="tagline">Explore our selection of bicycles and accessories</h1>
    <div class="grid-container">
  <!-- Anchor tag wraps the div block completely -->
  <a href="https://www.scott-sports.com/nz/en/products/bike" class="grid-link">
    <div class="grid-item" style="background-image: url('scottBackground.jpg');"><img class="grid-logo" src="scottLogo.png" width="100%" alt="Scott Logo"></div>
  </a>
  <a href="https://hybridbikes.co.nz/" class="grid-link">
    <div class="grid-item" style="background-image: url('hybridBackground.jpg');"><img class="grid-logo" src="hybridLogo.png" width="100%" alt="Hybrid Bikes Logo"></div>
  </a>
  <a href="https://www.trekbikes.com/nz/en_NZ/" class="grid-link">
    <div class="grid-item" style="background-image: url('trekBackground.jpg');"><img class="grid-logo" src="trekLogo.png" width="100%" alt="Trek Bikes Logo"></div>
  </a>
  <a href="https://pivotcycles.co.nz/" class="grid-link">
    <div class="grid-item" style="background-image: url('pivotBackground.jpg');"><img class="grid-logo" src="pivotLogo.png" width="100%" alt="Shimano Logo"></div>
  </a>
  <a href="https://www.velduro.com/" class="grid-link">
    <div class="grid-item" style="background-image: url('velduroBackground.jpg');"><img class="grid-logo" src="velduroLogo.png" width="100%" alt="Valduro Logo"></div>
  </a>
  <a href="https://www.merida-bikes.com/en-nz" class="grid-link">
    <div class="grid-item" style="background-image: url('meridaBackground.jpg');"><img class="grid-logo" src="meridaLogo.png" width="100%" alt="Merida Bikes Logo"></div>
  </a>
</div>
    <script src="script.js"></script>
</body>
</html>
